spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: portfolio-api
  profiles:
    default: dev
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/portfolio_db}
    username: ${DB_USER:portfolio_user}
    password: ${DB_PASSWORD:portfolio_password}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: ${PORT:8080}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  contact:
    rate-limit:
      requests-per-minute: ${CONTACT_RATE_LIMIT_PER_MINUTE:8}
    mail:
      enabled: ${CONTACT_MAIL_ENABLED:false}
      require-delivery: ${CONTACT_REQUIRE_EMAIL_DELIVERY:false}
      from: ${CONTACT_MAIL_FROM:no-reply@example.com}
      to: ${CONTACT_MAIL_TO:owner@example.com}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
